  .start-btn {

<body>

<div class="game-container">

<script>
// =============================================================================
//  AI DIFFICULTY PROFILES
// =============================================================================
const AI_DIFFICULTY = {
  easy: {
    label: 'Easy',
    speedFrac:      0.50,   // fraction of max paddle speed AI can use
    errorRange:     60,     // ±pixels of random target error
    errorUpdateRate:25,     // recalculate error every N frames
    mistakeChance:  0.007,  // per-frame probability of "losing focus"
    mistakeMin:     50,     // min frames for a mistake
    mistakeMax:     110,    // max frames for a mistake
    reactionFrames: 20,     // frames before AI reacts to new ball direction
    predictionFrac: 0.25,   // blend: 0=track raw Y, 1=full intercept prediction
    driftFrac:      0.04,   // how fast AI drifts to centre when idle
  },
  medium: {
    label: 'Medium',
    speedFrac:      0.72,
    errorRange:     30,
    errorUpdateRate:35,
    mistakeChance:  0.0035,
    mistakeMin:     25,
    mistakeMax:     60,
    reactionFrames: 10,
    predictionFrac: 0.65,
    driftFrac:      0.07,
  },
  hard: {
    label: 'Hard',
    speedFrac:      0.91,
    errorRange:     11,
    errorUpdateRate:50,
    mistakeChance:  0.0012,
    mistakeMin:     10,
    mistakeMax:     28,
    reactionFrames: 4,
    predictionFrac: 0.88,
    driftFrac:      0.12,
  },
};

// =============================================================================
//  SURFACE DEFINITIONS — heart of the physics differences
// =============================================================================
const SURFACES = {
  grass: {
    name: 'Grass',
    desc: 'Fast & low bounce — Wimbledon',
    courtColor: '#2a7a45',
    deepColor:  '#1d5c33',
    serviceColor: '#256e3e',
    lineColor:  'rgba(255,255,255,0.88)',
    netColor:   '#e0e0e0',
    // Ball physics
    initialSpeed:    7.2,   // pixels/frame at serve
    maxSpeed:        16,    // hard cap
    speedFactor:     1.07,  // multiplier per paddle hit
    wallFriction:    0.015, // fraction of vy lost each wall bounce
    airFriction:     0.0004,// tiny continuous deceleration
    spinStrength:    0.30,  // how much paddle offset changes angle
    paddleSpin:      0.25,  // how much paddle velocity adds spin
    // Paddle
    paddleSpeed:     7.5,
    paddleH:         80,
    // Visual
    particleColor:   '#90ee90',
    ballGlow:        'rgba(200,255,50,0.6)',
  },
  clay: {
    name: 'Clay',
    desc: 'Slow & heavy topspin — Roland Garros',
    courtColor: '#c05a18',
    deepColor:  '#9a4010',
    serviceColor: '#b05216',
    lineColor:  'rgba(255,255,255,0.80)',
    netColor:   '#d4c090',
    initialSpeed:    4.8,
    maxSpeed:        10,
    speedFactor:     1.04,
    wallFriction:    0.13,  // high — ball really slows on walls
    airFriction:     0.0012,
    spinStrength:    0.70,  // heavy spin possible
    paddleSpin:      0.55,
    paddleSpeed:     5.8,
    paddleH:         90,    // slightly bigger paddle (slower game, more rallies)
    particleColor:   '#d4875a',
    ballGlow:        'rgba(255,160,80,0.5)',
  },
  hardcourt: {
    name: 'Hard Court',
    desc: 'Medium pace & true bounce — US Open',
    courtColor: '#1e4fa0',
    deepColor:  '#163880',
    serviceColor: '#1b4590',
    lineColor:  'rgba(255,255,255,0.90)',
    netColor:   '#cccccc',
    initialSpeed:    6.0,
    maxSpeed:        13,
    speedFactor:     1.055,
    wallFriction:    0.06,
    airFriction:     0.0007,
    spinStrength:    0.50,
    paddleSpin:      0.38,
    paddleSpeed:     6.5,
    paddleH:         84,
    particleColor:   '#88aaff',
    ballGlow:        'rgba(100,160,255,0.55)',
  },
};

// =============================================================================
//  WEB AUDIO ENGINE
// =============================================================================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.ready = false;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.ready = true;
    } catch(e) {}
  }

  unlock() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  _tone(freq, type, gainVal, dur, startFreq) {
    if (!this.ready) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    if (startFreq) {
      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(freq, now + dur * 0.4);
    } else {
      osc.frequency.setValueAtTime(freq, now);
    }
    gain.gain.setValueAtTime(gainVal, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.01);
  }

  // Paddle hit — thwack
  playHit(speed = 8) {
    if (!this.ready) return;
    const pitch = 160 + speed * 12;
    this._tone(pitch * 0.5, 'square', 0.28, 0.09, pitch);
  }

  // Wall bounce — softer click
  playWall() {
    this._tone(280, 'sine', 0.18, 0.07, 420);
  }

  // Point scored — ascending triad
  playPoint() {
    if (!this.ready) return;
    [523, 659, 784].forEach((f, i) => {
      setTimeout(() => this._tone(f, 'sine', 0.3, 0.25), i * 100);
    });
  }

  // Game won — fanfare
  playGameWin() {
    if (!this.ready) return;
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => this._tone(f, 'triangle', 0.38, 0.35), i * 130);
    });
  }

  // Set won — full flourish
  playSetWin() {
    if (!this.ready) return;
    const melody = [523,659,784,659,784,1047,1175];
    const delays = [0,120,240,360,440,540,680];
    melody.forEach((f,i) => setTimeout(() => this._tone(f,'triangle',0.42,0.45), delays[i]));
  }

  // Serve — short swoosh
  playServe() {
    this._tone(180, 'sawtooth', 0.2, 0.12, 320);
  }
}

// =============================================================================
//  PARTICLE SYSTEM
// =============================================================================
class Particles {
  constructor() { this.list = []; }

  emit(x, y, color, count = 8, speed = 2.5) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const s = (0.5 + Math.random()) * speed;
      this.list.push({
        x, y,
        vx: Math.cos(angle) * s,
        vy: Math.sin(angle) * s,
        life: 1,
        decay: 0.028 + Math.random() * 0.035,
        r: 2 + Math.random() * 3,
        color,
      });
    }
  }

  update() {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.12;
      p.vx *= 0.96;
      p.life -= p.decay;
      p.r   *= 0.97;
      if (p.life <= 0) this.list.splice(i, 1);
    }
  }

  draw(ctx) {
    this.list.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }
}

// =============================================================================
//  CANVAS POLYFILL
// =============================================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// =============================================================================
//  MAIN GAME CLASS
// =============================================================================
class TennisPong {
  constructor() {
    this.canvas  = document.getElementById('gameCanvas');
    this.ctx     = this.canvas.getContext('2d');
    this.audio   = new AudioEngine();
    this.ptcl    = new Particles();

    this.W = this.canvas.width;
    this.H = this.canvas.height;

    // Mode & AI
    this.gameMode     = '1p';
    this.aiDifficulty = 'medium';
    this._resetAI();

    // Surface
    this.surfaceKey = 'grass';
    this.surf       = SURFACES.grass;

    // Paddle dimensions
    this.PW = 14;

    // Paddle state
    this.p1 = { x: 28, y: 0, w: this.PW, h: 80, vy: 0 };
    this.p2 = { x: this.W - 28 - this.PW, y: 0, w: this.PW, h: 80, vy: 0 };

    // Ball
    this.ball = this._newBall(1);

    // Trail
    this.trail = [];

    // Game state: 'menu' | 'playing' | 'paused' | 'gameover'
    this.state    = 'menu';
    this.serving  = 1;          // 1 or 2
    this.stateBeforePause = 'playing';

    // Tennis scoring
    this.LABELS   = ['0','15','30','40'];
    this.p1pts    = 0;   // 0-3
    this.p2pts    = 0;
    this.deuce    = false;
    this.adv      = 0;   // 0=none, 1=p1, 2=p2
    this.p1games  = 0;
    this.p2games  = 0;

    // Timers / effects
    this.waitTimer   = 0;
    this.flashTimer  = 0;
    this.msgText     = '';
    this.msgTimer    = 0;
    this.setWinner   = 0;

    // Input
    this.keys    = {};
    this.touch1  = null;
    this.touch2  = null;

    this._initInput();
    this._initUI();
    this._initModeUI();
    this._resetPaddles();
    this._resize();
    window.addEventListener('resize', () => this._resize());

    requestAnimationFrame(() => this._loop());
  }

  // ---------------------------------------------------------------------------
  //  SETUP
  // ---------------------------------------------------------------------------
  _resize() {
    const wrapper = document.getElementById('canvasWrapper');
    const maxW    = Math.min(window.innerWidth - 16, 820);
    const scale   = maxW / this.W;
    this.canvas.style.width  = maxW + 'px';
    this.canvas.style.height = (this.H * scale) + 'px';
  }

  _resetPaddles() {
    const s = this.surf;
    this.p1.h = s.paddleH;
    this.p2.h = s.paddleH;
    this.p1.y = this.H / 2 - s.paddleH / 2;
    this.p2.y = this.H / 2 - s.paddleH / 2;
    this.p1.vy = 0;
    this.p2.vy = 0;
  }

  _resetAI() {
    this.ai = {
      mistakeTimer:    0,     // frames remaining in current mistake
      reactionCounter: 0,     // frames since ball dir last changed
      lastVxSign:      0,     // sign of ball vx last frame (detect direction change)
      currentError:    0,     // current random Y offset applied to target
      errorTimer:      0,     // countdown to refresh error
    };
  }

  _initModeUI() {
    // Mode buttons (1P / 2P)
    document.querySelectorAll('#modeSelector .surface-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#modeSelector .surface-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.gameMode = btn.dataset.mode;
        const is1p = this.gameMode === '1p';
        document.getElementById('difficultySelector').style.display = is1p ? '' : 'none';
        document.getElementById('p2Name').textContent = is1p ? 'Rival' : 'Player 2';
        document.getElementById('controlsHint').innerHTML = is1p
          ? 'W / S &mdash; Player 1 &nbsp;|&nbsp; SPACE &mdash; Serve &nbsp;|&nbsp; ESC &mdash; Menu &nbsp;|&nbsp; Touch &mdash; Mobile'
          : 'W / S &mdash; Player 1 &nbsp;|&nbsp; &uarr; / &darr; &mdash; Player 2 &nbsp;|&nbsp; SPACE &mdash; Serve &nbsp;|&nbsp; ESC &mdash; Menu &nbsp;|&nbsp; Touch &mdash; Mobile';
        if (this.state !== 'menu') this._fullReset();
      });
    });

    // Difficulty buttons
    document.querySelectorAll('#difficultySelector .surface-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#difficultySelector .surface-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.aiDifficulty = btn.dataset.diff;
        if (this.state !== 'menu') this._fullReset();
      });
    });
  }

  // ---------------------------------------------------------------------------
  //  AI OPPONENT
  // ---------------------------------------------------------------------------
  _updateAI() {
    const b   = this.ball;
    const p2  = this.p2;
    const s   = this.surf;
    const cfg = AI_DIFFICULTY[this.aiDifficulty];
    const ai  = this.ai;
    const maxSpd = s.paddleSpeed * cfg.speedFrac;

    // Detect ball direction change → reset reaction counter
    const vxSign = b.vx > 0 ? 1 : b.vx < 0 ? -1 : 0;
    if (vxSign !== 0 && vxSign !== ai.lastVxSign) {
      ai.reactionCounter = 0;
      ai.lastVxSign = vxSign;
    }

    // Active mistake: AI drifts lazily, ignores ball
    if (ai.mistakeTimer > 0) {
      ai.mistakeTimer--;
      const centre = this.H / 2 - p2.h / 2;
      const drift  = Math.max(-maxSpd * 0.5, Math.min(maxSpd * 0.5, (centre - p2.y) * cfg.driftFrac));
      p2.vy = p2.vy * 0.75 + drift * 0.25;
      p2.y  = Math.max(0, Math.min(this.H - p2.h, p2.y + p2.vy));
      return;
    }

    // Ball moving away or inactive → drift to centre
    if (!b.active || b.vx <= 0) {
      const centre = this.H / 2 - p2.h / 2;
      const drift  = Math.max(-maxSpd * 0.6, Math.min(maxSpd * 0.6, (centre - p2.y) * cfg.driftFrac));
      p2.vy = p2.vy * 0.75 + drift * 0.25;
      p2.y  = Math.max(0, Math.min(this.H - p2.h, p2.y + p2.vy));
      return;
    }

    // Reaction delay: AI hasn't noticed ball direction change yet
    ai.reactionCounter++;
    if (ai.reactionCounter < cfg.reactionFrames) {
      p2.vy *= 0.85;
      return;
    }

    // Predict intercept Y (linear, ignoring spin for realism)
    let targetY = b.y;
    if (cfg.predictionFrac > 0 && b.vx > 0) {
      const timeToReach = (p2.x - b.x) / b.vx;
      let py = b.y + b.vy * timeToReach;
      // Simulate wall bounces (modular reflection)
      const H = this.H;
      py = ((py % (H * 2)) + H * 2) % (H * 2);
      if (py > H) py = H * 2 - py;
      targetY = b.y * (1 - cfg.predictionFrac) + py * cfg.predictionFrac;
    }

    // Refresh random error periodically (AI is imprecise)
    if (ai.errorTimer <= 0) {
      ai.currentError = (Math.random() * 2 - 1) * cfg.errorRange;
      ai.errorTimer   = cfg.errorUpdateRate + Math.floor(Math.random() * 20);
    }
    ai.errorTimer--;
    targetY += ai.currentError;

    // Move paddle toward target (paddle centre → targetY)
    const paddleTarget = targetY - p2.h / 2;
    const delta  = paddleTarget - p2.y;
    const move   = Math.max(-maxSpd, Math.min(maxSpd, delta * 0.20));
    p2.vy = p2.vy * 0.75 + move * 0.25;
    p2.y  = Math.max(0, Math.min(this.H - p2.h, p2.y + p2.vy));

    // Random mistake: AI momentarily loses focus
    if (Math.random() < cfg.mistakeChance) {
      ai.mistakeTimer   = cfg.mistakeMin + Math.floor(Math.random() * (cfg.mistakeMax - cfg.mistakeMin));
      ai.reactionCounter = 0;
    }
  }

  _newBall(dir) {
    const s = this.surf;
    // Small randomised angle so ball doesn't go perfectly horizontal
    const spread = 22 * Math.PI / 180;
    const angle  = (Math.random() * spread - spread / 2) * (Math.random() > 0.5 ? 1 : -1);
    return {
      x:  this.W / 2,
      y:  this.H / 2,
      r:  9,
      vx: dir * s.initialSpeed * Math.cos(angle),
      vy: s.initialSpeed * Math.sin(angle),
      spin: 0,
      active: false,
    };
  }

  // ---------------------------------------------------------------------------
  //  INPUT
  // ---------------------------------------------------------------------------
  _initInput() {
    window.addEventListener('keydown', e => {
      this.keys[e.key] = true;
      if (['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
      this.audio.unlock();
      if (e.key === ' ' && this.state === 'playing' && !this.ball.active) {
        // In 1P mode, only allow P1 to serve manually when it's their turn
        if (this.gameMode === '2p' || this.serving === 1) this._serve();
      }
      if (e.key === 'Escape') {
        if (this.state === 'playing') this._togglePause();
        else if (this.state === 'paused') this._togglePause();
      }
    });
    window.addEventListener('keyup', e => { this.keys[e.key] = false; });

    const onTouchStart = e => {
      e.preventDefault();
      this.audio.unlock();
      const rect  = this.canvas.getBoundingClientRect();
      const scaleX = this.W / rect.width;
      const scaleY = this.H / rect.height;
      for (const t of e.changedTouches) {
        const cx = (t.clientX - rect.left) * scaleX;
        const cy = (t.clientY - rect.top)  * scaleY;
        if (cx < this.W / 2) {
          this.touch1 = { id: t.identifier, y: cy };
        } else {
          this.touch2 = { id: t.identifier, y: cy };
        }
      }
      // Tap to serve (only when it's the human player's turn)
      if (this.state === 'playing' && !this.ball.active) {
        if (this.gameMode === '2p' || this.serving === 1) this._serve();
      }
    };

    const onTouchMove = e => {
      e.preventDefault();
      const rect   = this.canvas.getBoundingClientRect();
      const scaleY = this.H / rect.height;
      for (const t of e.changedTouches) {
        const cy = (t.clientY - rect.top) * scaleY;
        if (this.touch1 && this.touch1.id === t.identifier) this.touch1.y = cy;
        if (this.touch2 && this.touch2.id === t.identifier) this.touch2.y = cy;
      }
    };

    const onTouchEnd = e => {
      for (const t of e.changedTouches) {
        if (this.touch1 && this.touch1.id === t.identifier) this.touch1 = null;
        if (this.touch2 && this.touch2.id === t.identifier) this.touch2 = null;
      }
    };

    this.canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    this.canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
    this.canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
  }

  _initUI() {
    document.querySelectorAll('.surface-btn[data-surface]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.audio.unlock();
        document.querySelectorAll('.surface-btn[data-surface]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.surfaceKey = btn.dataset.surface;
        this.surf       = SURFACES[this.surfaceKey];
        document.getElementById('surfaceDesc').textContent = this.surf.desc;
        if (this.state !== 'menu') this._fullReset();
      });
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      this.audio.unlock();
      this._startGame();
    });

    document.getElementById('exitBtn').addEventListener('click', () => {
      this.audio.unlock();
      if (this.state === 'paused') {
        this._exitToMenu();
      } else {
        this._togglePause();
      }
    });
  }

  // ---------------------------------------------------------------------------
  //  GAME FLOW
  // ---------------------------------------------------------------------------
  _startGame() {
    this._fullReset();
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('exitBtn').style.display = 'block';
    this.state = 'playing';
    this.ball  = this._newBall(this.serving === 1 ? 1 : -1);
    setTimeout(() => this._serve(), 900);
  }

  _fullReset() {
    this.p1pts   = 0; this.p2pts   = 0;
    this.p1games = 0; this.p2games = 0;
    this.deuce   = false; this.adv = 0;
    this.serving = 1;
    this.setWinner = 0;
    this.trail   = [];
    this.ptcl.list = [];
    this.msgText = ''; this.msgTimer = 0;
    this._resetPaddles();
    this._resetAI();
    this.ball = this._newBall(1);
    this._updateHUD();
  }

  _p2Name() {
    return this.gameMode === '1p' ? 'Rival' : 'Player 2';
  }

  _serve() {
    if (this.state !== 'playing' || this.ball.active) return;
    this.ball = this._newBall(this.serving === 1 ? 1 : -1);
    this.ball.active = true;
    this.audio.playServe();
    this.trail = [];
    // Reset AI reaction so it has to "notice" the new ball
    this.ai.reactionCounter = 0;
    this.ai.lastVxSign = 0;
  }

  // ---------------------------------------------------------------------------
  //  TENNIS SCORING
  // ---------------------------------------------------------------------------
  _awardPoint(player) {
    if (this.deuce) {
      if (this.adv === player) {
        // Win the game
        this._winGame(player);
        return;
      } else if (this.adv === 0) {
        this.adv = player;
        const advName = player === 1 ? 'P1' : this._p2Name().toUpperCase().slice(0, 3);
        this._flash('ADV ' + advName, player);
      } else {
        // Back to deuce
        this.adv = 0;
        this._flash('DEUCE', 0);
      }
    } else {
      if (player === 1) this.p1pts++;
      else              this.p2pts++;

      const p1w = this.p1pts >= 4 && (this.p1pts - this.p2pts) >= 2;
      const p2w = this.p2pts >= 4 && (this.p2pts - this.p1pts) >= 2;
      const isDeuce = this.p1pts >= 3 && this.p2pts >= 3 && this.p1pts === this.p2pts;

      if (isDeuce) {
        this.deuce = true;
        this.p1pts = 3;
        this.p2pts = 3;
        this._flash('DEUCE', 0);
      } else if (p1w) {
        this._winGame(1); return;
      } else if (p2w) {
        this._winGame(2); return;
      } else {
        const ptName = player === 1 ? 'P1' : this._p2Name().toUpperCase().slice(0, 3);
        this._flash('POINT ' + ptName, player);
      }
    }

    this._updateHUD();
    this.audio.playPoint();
    this.ball.active  = false;
    this.trail        = [];
    this.serving      = player === 1 ? 2 : 1;  // other player serves next
    this.state        = 'playing';
    setTimeout(() => {
      if (this.state === 'playing') this._serve();
    }, 1500);
  }

  _winGame(player) {
    if (player === 1) this.p1games++;
    else              this.p2games++;

    this.p1pts = 0; this.p2pts = 0;
    this.deuce = false; this.adv = 0;
    this.audio.playGameWin();
    const gameName = player === 1 ? 'P1' : this._p2Name().toUpperCase().slice(0, 3);
    this._flash('GAME ' + gameName + '!', player);
    this._updateHUD();

    // Check set (first to 6 with 2+ lead)
    const p1s = this.p1games, p2s = this.p2games;
    if ((p1s >= 6 || p2s >= 6) && Math.abs(p1s - p2s) >= 2) {
      this.setWinner = player;
      this.state     = 'gameover';
      this.audio.playSetWin();
      setTimeout(() => this._showGameOver(), 2000);
      return;
    }

    this.ball.active = false;
    this.trail       = [];
    this.serving     = player; // game winner serves
    this.state       = 'playing';
    setTimeout(() => {
      if (this.state === 'playing') this._serve();
    }, 2000);
  }

  _flash(text, player) {
    this.msgText  = text;
    this.msgTimer = 90;
    this.flashTimer = 8;
  }

  _togglePause() {
    if (this.state === 'playing') {
      this.state = 'paused';
      document.getElementById('exitBtn').textContent = '✕ Exit to Menu';
      document.getElementById('exitBtn').style.borderColor = 'rgba(255,120,120,0.45)';
      document.getElementById('exitBtn').style.color = '#ffaaaa';
    } else if (this.state === 'paused') {
      this.state = 'playing';
      document.getElementById('exitBtn').textContent = '⬅ Menu';
      document.getElementById('exitBtn').style.borderColor = 'rgba(255,255,255,0.18)';
      document.getElementById('exitBtn').style.color = 'rgba(255,255,255,0.55)';
    }
  }

  _exitToMenu() {
    this._fullReset();
    this.state = 'menu';
    document.getElementById('exitBtn').style.display = 'none';
    document.getElementById('exitBtn').textContent = '⬅ Menu';
    document.getElementById('exitBtn').style.borderColor = 'rgba(255,255,255,0.18)';
    document.getElementById('exitBtn').style.color = 'rgba(255,255,255,0.55)';
    // Restore overlay to start-screen state
    const overlay = document.getElementById('overlay');
    const title   = overlay.querySelector('h2');
    const sub     = overlay.querySelectorAll('p')[0];
    const btn     = document.getElementById('startBtn');
    title.textContent = 'TENNIS PONG';
    title.style.color = '#f0d060';
    sub.textContent   = 'First to 6 games wins the set\nChoose a surface above — each plays differently';
    btn.textContent   = 'SERVE ▶';
    overlay.style.display = 'flex';
  }

  _showGameOver() {
    const overlay = document.getElementById('overlay');
    const title   = overlay.querySelector('h2');
    const sub     = overlay.querySelectorAll('p')[0];
    const btn     = document.getElementById('startBtn');
    const w = this.setWinner;
    const wName = w === 1 ? 'PLAYER 1' : this._p2Name().toUpperCase();
    title.textContent = `${wName} WINS!`;
    title.style.color = w === 1 ? '#66aaff' : '#ff6666';
    sub.textContent   = `Set: ${this.p1games}–${this.p2games} on ${this.surf.name}`;
    btn.textContent   = 'PLAY AGAIN ▶';
    document.getElementById('exitBtn').style.display = 'none';
    overlay.style.display = 'flex';
  }

  // ---------------------------------------------------------------------------
  //  HUD
  // ---------------------------------------------------------------------------
  _updateHUD() {
    let p1l, p2l;
    if (this.deuce) {
      p1l = this.adv === 1 ? 'ADV' : (this.adv === 2 ? '40' : '40');
      p2l = this.adv === 2 ? 'ADV' : (this.adv === 1 ? '40' : '40');
      if (this.adv === 0) { p1l = 'DUC'; p2l = 'DUC'; }
    } else {
      p1l = this.LABELS[Math.min(this.p1pts, 3)];
      p2l = this.LABELS[Math.min(this.p2pts, 3)];
    }
    document.getElementById('p1Points').textContent = p1l;
    document.getElementById('p2Points').textContent = p2l;
    document.getElementById('p1Games').textContent  = this.p1games + (this.p1games === 1 ? ' game' : ' games');
    document.getElementById('p2Games').textContent  = this.p2games + (this.p2games === 1 ? ' game' : ' games');
    document.getElementById('setScore').textContent = this.p1games + ' — ' + this.p2games;
  }

  // ---------------------------------------------------------------------------
  //  PHYSICS UPDATE
  // ---------------------------------------------------------------------------
  _update() {
    if (this.state === 'gameover' || this.state === 'paused' || this.state === 'menu') return;

    const s   = this.surf;
    const spd = s.paddleSpeed;

    // --- Paddle 1 ---
    let p1move = 0;
    if (this.keys['w'] || this.keys['W'])     p1move = -spd;
    else if (this.keys['s'] || this.keys['S']) p1move = spd;
    else if (this.touch1) {
      const target = this.touch1.y - this.p1.h / 2;
      p1move = Math.max(-spd, Math.min(spd, (target - this.p1.y) * 0.22));
    }
    this.p1.vy = this.p1.vy * 0.75 + p1move * 0.25;
    this.p1.y  = Math.max(0, Math.min(this.H - this.p1.h, this.p1.y + this.p1.vy));

    // --- Paddle 2 (human or AI) ---
    if (this.gameMode === '1p') {
      this._updateAI();
    } else {
      let p2move = 0;
      if (this.keys['ArrowUp'])        p2move = -spd;
      else if (this.keys['ArrowDown']) p2move = spd;
      else if (this.touch2) {
        const target = this.touch2.y - this.p2.h / 2;
        p2move = Math.max(-spd, Math.min(spd, (target - this.p2.y) * 0.22));
      }
      this.p2.vy = this.p2.vy * 0.75 + p2move * 0.25;
      this.p2.y  = Math.max(0, Math.min(this.H - this.p2.h, this.p2.y + this.p2.vy));
    }

    // --- Ball ---
    if (!this.ball.active || this.state !== 'playing') {
      this.ptcl.update();
      this.flashTimer  = Math.max(0, this.flashTimer - 1);
      this.msgTimer    = Math.max(0, this.msgTimer - 1);
      return;
    }

    const b = this.ball;

    // Air friction (surface-specific drag)
    const curSpd = Math.hypot(b.vx, b.vy);
    if (curSpd > 0.1) {
      const drag = 1 - s.airFriction;
      b.vx *= drag;
      b.vy *= drag;
    }

    // Apply spin influence (slight curve)
    b.vx += b.spin * 0.018;
    b.spin *= 0.97;

    // Move
    b.x += b.vx;
    b.y += b.vy;

    // Trail
    this.trail.push({ x: b.x, y: b.y, a: 1 });
    if (this.trail.length > 14) this.trail.shift();
    this.trail.forEach(t => t.a *= 0.82);

    // --- Wall collisions (top / bottom) ---
    if (b.y - b.r < 0) {
      b.y  = b.r;
      b.vy = Math.abs(b.vy) * (1 - s.wallFriction);
      b.spin += b.vx * s.spinStrength * 0.06; // wall imparts slight spin
      this.audio.playWall();
      this.ptcl.emit(b.x, b.r, s.particleColor, 5, 1.8);
    }
    if (b.y + b.r > this.H) {
      b.y  = this.H - b.r;
      b.vy = -Math.abs(b.vy) * (1 - s.wallFriction);
      b.spin += b.vx * s.spinStrength * 0.06;
      this.audio.playWall();
      this.ptcl.emit(b.x, this.H - b.r, s.particleColor, 5, 1.8);
    }

    // --- Score (ball leaves screen) ---
    if (b.x < -40) {
      b.active = false;
      this.ptcl.emit(40, b.y, '#ff6666', 18, 4);
      this._awardPoint(2);
      return;
    }
    if (b.x > this.W + 40) {
      b.active = false;
      this.ptcl.emit(this.W - 40, b.y, '#66aaff', 18, 4);
      this._awardPoint(1);
      return;
    }

    // --- Paddle collisions ---
    this._checkPaddleHit(this.p1, 1);
    this._checkPaddleHit(this.p2, -1);

    // Particles & timers
    this.ptcl.update();
    this.flashTimer = Math.max(0, this.flashTimer - 1);
    this.msgTimer   = Math.max(0, this.msgTimer - 1);
  }

  _checkPaddleHit(paddle, dirX) {
    const b = this.ball;
    const s = this.surf;

    const hitLeft  = dirX === 1;
    const frontX   = hitLeft ? paddle.x + paddle.w : paddle.x;

    // Ball approaching paddle face
    const approaching = (hitLeft && b.vx < 0) || (!hitLeft && b.vx > 0);
    if (!approaching) return;

    const withinX = hitLeft
      ? (b.x - b.r <= frontX && b.x + b.r >= paddle.x)
      : (b.x + b.r >= frontX && b.x - b.r <= paddle.x + paddle.w);

    const withinY = b.y >= paddle.y - b.r && b.y <= paddle.y + paddle.h + b.r;

    if (!withinX || !withinY) return;

    // Reposition
    b.x = hitLeft ? frontX + b.r + 1 : frontX - b.r - 1;

    // Hit position along paddle: -0.5 (top) to +0.5 (bottom)
    const hitRatio  = (b.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
    const clampedHR = Math.max(-1, Math.min(1, hitRatio));

    // Speed increase, capped by surface max
    const curSpd  = Math.hypot(b.vx, b.vy);
    const newSpd  = Math.min(curSpd * s.speedFactor, s.maxSpeed);

    // Angle from hit position + paddle velocity contribution
    const baseAngle    = clampedHR * Math.PI * 0.55 * s.spinStrength;
    const paddleEffect = (paddle.vy / s.paddleSpeed) * s.paddleSpin;
    const angle        = baseAngle + paddleEffect;

    b.vx   = dirX * newSpd * Math.cos(angle);
    b.vy   = newSpd * Math.sin(angle);
    b.spin = clampedHR * s.spinStrength * newSpd * 0.15;

    // Visual effects
    this.audio.playHit(newSpd);
    this.ptcl.emit(b.x, b.y, '#ffff88', 7, 2.5);
    this.flashTimer = 4;
    this.trail = [];
  }

  // ---------------------------------------------------------------------------
  //  RENDERING
  // ---------------------------------------------------------------------------
  _draw() {
    const ctx  = this.ctx;
    const s    = this.surf;
    const b    = this.ball;

    // --- Court background ---
    ctx.fillStyle = s.courtColor;
    ctx.fillRect(0, 0, this.W, this.H);

    // --- Deep / baseline areas (slightly darker) ---
    ctx.fillStyle = s.deepColor;
    ctx.fillRect(0, 0, 60, this.H);
    ctx.fillRect(this.W - 60, 0, 60, this.H);

    // --- Court lines ---
    this._drawLines();

    // --- Net ---
    this._drawNet();

    // --- Particles ---
    this.ptcl.draw(ctx);

    // --- Ball trail ---
    if (b.active) {
      this.trail.forEach((t, i) => {
        const frac = i / this.trail.length;
        ctx.save();
        ctx.globalAlpha = t.a * frac * 0.55;
        ctx.fillStyle   = '#c8ff00';
        ctx.beginPath();
        ctx.arc(t.x, t.y, b.r * frac * 0.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    // --- Ball ---
    if (b.active) this._drawBall();

    // --- Paddles ---
    this._drawPaddle(this.p1, '#4488ff', '#2255cc');
    this._drawPaddle(this.p2, '#ff5555', '#cc2222');

    // --- Screen flash on hit ---
    if (this.flashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.flashTimer * 0.025})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }

    // --- Serve indicator ---
    if (this.state === 'playing' && !b.active) {
      const isAIServe = this.gameMode === '1p' && this.serving === 2;
      ctx.save();
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(Date.now() / 300);
      ctx.fillStyle   = '#f0d060';
      ctx.font        = 'bold 14px Georgia';
      ctx.textAlign   = 'center';
      if (isAIServe) {
        ctx.fillText('Rival serving…', this.W / 2, this.H / 2 + 36);
      } else {
        ctx.fillText('SPACE or Tap to Serve', this.W / 2, this.H / 2 + 36);
      }
      ctx.restore();
    }

    // --- Point / Game message ---
    if (this.msgTimer > 0) {
      const alpha = Math.min(1, this.msgTimer / 20);
      ctx.save();
      ctx.globalAlpha  = alpha;
      ctx.fillStyle    = 'rgba(0,0,0,0.55)';
      const mw = 240, mh = 56;
      ctx.beginPath();
      ctx.roundRect(this.W / 2 - mw / 2, this.H / 2 - mh / 2 - 6, mw, mh, 10);
      ctx.fill();
      ctx.fillStyle = this.msgText.includes('1') ? '#88bbff'
                    : this.msgText.includes('2') ? '#ff8888'
                    : '#f0d060';
      ctx.font      = 'bold 26px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.msgText, this.W / 2, this.H / 2 - 6 + mh / 2 - 4);
      ctx.restore();
    }

    // --- Ghost surface name ---
    ctx.save();
    ctx.globalAlpha  = 0.06;
    ctx.fillStyle    = 'white';
    ctx.font         = 'bold 90px Georgia';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.name.toUpperCase(), this.W / 2, this.H / 2);
    ctx.restore();

    // --- Pause overlay ---
    if (this.state === 'paused') {
      // Dim the court
      ctx.fillStyle = 'rgba(0,0,0,0.62)';
      ctx.fillRect(0, 0, this.W, this.H);

      // Card
      const cw = 300, ch = 170;
      const cx = this.W / 2 - cw / 2, cy = this.H / 2 - ch / 2;
      ctx.fillStyle = 'rgba(12,18,36,0.96)';
      ctx.beginPath();
      ctx.roundRect(cx, cy, cw, ch, 14);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Title
      ctx.fillStyle = '#f0d060';
      ctx.font = 'bold 22px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', this.W / 2, cy + 40);

      // Divider
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + 24, cy + 64); ctx.lineTo(cx + cw - 24, cy + 64);
      ctx.stroke();

      // Resume hint
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '14px Georgia';
      ctx.fillText('Press ESC to Resume', this.W / 2, cy + 92);

      // Exit hint
      ctx.fillStyle = 'rgba(255,120,120,0.80)';
      ctx.font = '13px Georgia';
      ctx.fillText('Click ✕ Exit to Menu button to quit', this.W / 2, cy + 124);

      // Score reminder
      ctx.fillStyle = 'rgba(255,255,255,0.30)';
      ctx.font = '11px Georgia';
      ctx.fillText(`Score: P1 ${this.p1games}  —  ${this.p2games} ${this._p2Name()}`, this.W / 2, cy + 150);
    }
  }

  _drawLines() {
    const ctx = this.ctx;
    const s   = this.surf;
    const lw  = 2;

    ctx.strokeStyle = s.lineColor;
    ctx.lineWidth   = lw;

    const M = 20; // margin from edge

    // Outer boundary
    ctx.strokeRect(M, M, this.W - M * 2, this.H - M * 2);

    const mx = this.W / 2;
    const my = this.H / 2;

    // Centre line (full vertical)
    ctx.beginPath();
    ctx.moveTo(mx, M); ctx.lineTo(mx, this.H - M);
    ctx.stroke();

    // Centre horizontal (service line)
    ctx.beginPath();
    ctx.moveTo(M, my); ctx.lineTo(this.W - M, my);
    ctx.stroke();

    // Service lines (quarter marks)
    const sx1 = M + (mx - M) / 2;
    const sx2 = mx + (this.W - M - mx) / 2;

    ctx.beginPath();
    ctx.moveTo(sx1, M); ctx.lineTo(sx1, this.H - M);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(sx2, M); ctx.lineTo(sx2, this.H - M);
    ctx.stroke();

    // Centre marks at baselines
    ctx.beginPath();
    ctx.moveTo(mx - 6, M); ctx.lineTo(mx + 6, M);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mx - 6, this.H - M); ctx.lineTo(mx + 6, this.H - M);
    ctx.stroke();
  }

  _drawNet() {
    const ctx = this.ctx;
    const s   = this.surf;
    const nx  = this.W / 2;

    // Net posts
    ctx.fillStyle = '#999';
    ctx.fillRect(nx - 3, 0, 6, 14);
    ctx.fillRect(nx - 3, this.H - 14, 6, 14);

    // Net mesh (alternating lines)
    for (let y = 14; y < this.H - 14; y += 7) {
      const bright = (Math.floor(y / 7) % 2 === 0);
      ctx.strokeStyle = bright ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(nx - 2, y);
      ctx.lineTo(nx + 2, y);
      ctx.stroke();
    }

    // Main net cable
    ctx.strokeStyle = s.netColor;
    ctx.lineWidth   = 3;
    ctx.beginPath();
    ctx.moveTo(nx, 0); ctx.lineTo(nx, this.H);
    ctx.stroke();

    // White tape at centre strap
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fillRect(nx - 4, this.H / 2 - 4, 8, 8);
  }

  _drawBall() {
    const ctx = this.ctx;
    const b   = this.ball;
    const s   = this.surf;

    // Glow
    const grd = ctx.createRadialGradient(b.x, b.y, b.r * 0.2, b.x, b.y, b.r * 2.2);
    grd.addColorStop(0, s.ballGlow);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // Shadow
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle   = '#000';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y + b.r + 4, b.r * 0.75, b.r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Ball body
    const body = ctx.createRadialGradient(b.x - 2, b.y - 2, 0.5, b.x, b.y, b.r);
    body.addColorStop(0, '#e8ff70');
    body.addColorStop(0.65, '#c8e000');
    body.addColorStop(1, '#9eb800');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();

    // Felt seams
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.68, -0.4, 0.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.68, Math.PI - 0.4, Math.PI + 0.6);
    ctx.stroke();
  }

  _drawPaddle(p, colorA, colorB) {
    const ctx = this.ctx;
    const r   = 6;

    // Drop shadow
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.fillStyle   = '#000';
    ctx.beginPath();
    ctx.roundRect(p.x + 4, p.y + 4, p.w, p.h, r);
    ctx.fill();
    ctx.restore();

    // Body gradient
    const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
    grad.addColorStop(0, colorA);
    grad.addColorStop(1, colorB);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, p.h, r);
    ctx.fill();

    // String grid (horizontal)
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, p.h, r);
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth   = 1;
    for (let y = p.y + 5; y < p.y + p.h - 3; y += 7) {
      ctx.beginPath();
      ctx.moveTo(p.x + 2, y);
      ctx.lineTo(p.x + p.w - 2, y);
      ctx.stroke();
    }
    ctx.restore();

    // Highlight edge
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w * 0.5, p.h, r);
    ctx.fill();

    // Indicator dot
    ctx.fillStyle = colorA;
    ctx.beginPath();
    ctx.arc(p.x + p.w / 2, p.y + 9, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---------------------------------------------------------------------------
  //  MAIN LOOP
  // ---------------------------------------------------------------------------
  _loop() {
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }
}

// =============================================================================
//  BOOT
// =============================================================================
window.addEventListener('load', () => {
  new TennisPong();
  // Set initial surface desc
  document.getElementById('surfaceDesc').textContent = SURFACES.grass.desc;
});
</script>
